name: SQL Lint

on:
  push:
    paths:
      - "gold/sql/**"
  pull_request:
    paths:
      - "gold/sql/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff==3.1.0

      - name: Lint SQL files
        run: sqlfluff lint gold/sql/ --dialect tsql --config .sqlfluff
